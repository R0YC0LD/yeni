<!DOCTYPE html>
<html lang="tr">
<head>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#030303">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="simge.jpg" type="image/jpeg">
  <title>Profil & Ayarlar - MüzikHan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-container">
    
    <div id="sidebar-container"></div>
    
    <div class="main-content">
      <div id="navbar-container"></div>

      <div class="card" data-role="all" style="max-width: 500px; margin: 0 auto; border-color: var(--shn-pink);">
        <h3 style="margin-bottom: 1.5rem; text-align:center; color: var(--shn-pink);">Ayarlar</h3>
        
        <div style="display:flex; flex-direction:column; align-items:center; margin-bottom: 2rem;">
          <div id="prof-avatar-preview" class="avatar" style="width: 100px; height: 100px; margin-bottom: 1rem; background-size: cover; background-position: center; border: 2px solid var(--shn-pink);"></div>
          <input type="file" id="prof-avatar-file" accept="image/*" style="display:none;">
          <button class="btn btn-secondary" onclick="document.getElementById('prof-avatar-file').click()" style="margin-bottom: 10px;">Fotoğraf Seç</button>
          <button id="upload-avatar-btn" class="btn btn-primary" style="display:none;">Fotoğrafı Kaydet</button>
        </div>

        <div class="stats" id="profile-stats">
          <div class="stat"><div class="n" id="ps-demos">0</div><div class="l">Demo</div></div>
          <div class="stat"><div class="n" id="ps-votes">0</div><div class="l">Oy</div></div>
          <div class="stat"><div class="n" id="ps-friends">0</div><div class="l">Arkadaş</div></div>
        </div>

        <div class="bio-card">
          <div class="lbl">
            <span style="font-family:'Space Mono'; font-size:0.6rem; letter-spacing:2px; color:var(--text-mut); text-transform:uppercase;">Biyografi</span>
            <button class="btn btn-ghost btn-sm" id="bio-edit-btn" style="padding:4px; font-size:0.6rem;">DÜZENLE</button>
          </div>
          <div class="bio-text empty" id="bio-display">Henüz biyografi eklenmedi.</div>
          <div id="bio-editor" class="hidden">
            <textarea id="bio-input" class="mb-3" placeholder="Tarzını, ekipmanını yaz..." style="width:100%; min-height:80px;"></textarea>
            <div style="display:flex; gap:10px;">
              <button class="btn btn-primary" id="bio-save">Kaydet</button>
              <button class="btn btn-ghost" id="bio-cancel">Vazgeç</button>
            </div>
          </div>
        </div>

        <h4 style="margin-bottom: 1rem; font-family: 'Space Mono'; font-size:1rem; color:#fff;">Görünen Adınız</h4>
        <input type="text" id="prof-name" class="mb-3" style="color: var(--txt);">
        <button id="update-name-btn" class="btn btn-primary" style="width: 100%; margin-bottom: 2rem;">İsmi Güncelle</button>

        <h4 style="margin-bottom: 1rem; font-family: 'Space Mono'; font-size:1rem; color:#fff;">E-posta Bilgisi</h4>
        <input type="text" id="prof-email" class="mb-3" disabled style="color: var(--mut);">

        <hr style="border-color: var(--line-strong); margin: 2rem 0;">

        <h4 style="margin-bottom: 1rem; font-family: 'Space Mono'; font-size:1rem; color:#fff;">E-posta Değiştir</h4>
        <label>Yeni E-posta</label>
        <input type="email" id="prof-new-email" class="mb-3">
        <button id="update-email-btn" class="btn btn-primary" style="width: 100%; margin-bottom: 2rem;">E-postayı Güncelle</button>

        <h4 style="margin-bottom: 1rem; font-family: 'Space Mono'; font-size:1rem; color:#fff;">Şifre Değiştir</h4>
        <label>Yeni Şifre (En az 6 karakter)</label>
        <input type="password" id="prof-new-pwd" class="mb-3">
        <button id="update-pwd-btn" class="btn btn-primary" style="width: 100%;">Şifreyi Güncelle</button>
      </div>
      
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/profile.js"></script>
</body>
</html>
