<!DOCTYPE html>
<html lang="tr">
<head>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#030303">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="simge.jpg" type="image/jpeg">
  <title>Demolar - MüzikHan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <style>
    /* Oylama Yıldızları için CSS */
    .star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 5px; }
    .star-rating input { display: none; }
    .star-rating label { color: var(--mut); cursor: pointer; font-size: 1.5rem; transition: 0.2s; }
    .star-rating input:checked ~ label { color: var(--shn-pink); text-shadow: 0 0 10px var(--shn-pink); }
    .star-rating label:hover, .star-rating label:hover ~ label { color: var(--shn-pink); }
    
    .rating-group { margin-bottom: 10px; }
    .rating-label { font-size: 0.8rem; font-family: 'Space Mono'; margin-bottom: 4px; display: block; }
    
    .rating-popup { display: none; margin-top: 15px; border-top: 1px solid var(--line-strong); padding-top: 15px; }
    .prod-by { position: absolute; bottom: 15px; right: 15px; font-size: 0.65rem; color: var(--mut); font-family: 'Space Mono'; }
  </style>
</head>
<body>
  <div class="app-container">
    
    <div id="sidebar-container"></div>
    
    <div class="main-content">
      <div id="navbar-container"></div>

      <div class="card" data-role="producer,admin">
        <h3 style="margin-bottom: 1rem; color: var(--shn-pink);">Yeni Demo Yükle</h3>
        <div style="display:flex; flex-direction:column; gap:1rem; margin-bottom:1rem;">
          <input type="text" id="demo-title" placeholder="Şarkı Adı (Ana Başlık)">
          <input type="text" id="demo-beatmaker" placeholder="Beatmaker / Producer İsim">
          <input type="file" id="demo-file" accept="audio/*,.mp3,.wav,.m4a,.aac,.ogg,.flac">
        </div>
        <button id="upload-demo-btn" class="btn btn-primary" style="width: 100%;">Demoyu Yükle</button>
      </div>

      <div id="demos-list" class="list-grid">
        <!-- JS yüklenecek -->
        <p>Yükleniyor...</p>
      </div>
      
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/demos.js"></script>
</body>
</html>
