<!DOCTYPE html>
<html lang="tr">
<head>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#030303">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="simge.jpg" type="image/jpeg">
  <title>Mutfak - MüzikHan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <style>
    .star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 5px; }
    .star-rating input { display: none; }
    .star-rating label { color: var(--mut); cursor: pointer; font-size: 1.5rem; transition: 0.2s; }
    .star-rating input:checked ~ label { color: var(--shn-pink); text-shadow: 0 0 10px var(--shn-pink); }
    .star-rating label:hover, .star-rating label:hover ~ label { color: var(--shn-pink); }
    .rating-group { margin-bottom: 10px; }
    .rating-label { font-size: 0.8rem; font-family: 'Space Mono'; margin-bottom: 4px; display: block; }
    .rating-popup { display: none; margin-top: 15px; border-top: 1px solid var(--line-strong); padding-top: 15px; }
  </style>
</head>
<body>
  <div class="app-container">
    
    <div id="sidebar-container"></div>
    
    <div class="main-content">
      <div id="navbar-container"></div>

      <div class="card" data-role="producer,crew,admin">
        <h3 style="margin-bottom: 1.5rem; color: var(--shn-pink);">Mutfak</h3>
        
        <div style="display:flex; gap:1rem; margin-bottom:2rem; border-bottom:1px solid var(--line); padding-bottom:1rem;">
          <button class="btn btn-secondary" id="tab-beats" onclick="switchKitchenTab('beats')">Beats</button>
          <button class="btn btn-secondary" id="tab-presets" onclick="switchKitchenTab('presets')">Presets</button>
          <button class="btn btn-secondary" id="tab-stems" onclick="switchKitchenTab('stems')">Stems</button>
        </div>

        <div id="panel-beats" class="kitchen-panel">
          <div style="display:flex; flex-direction:column; gap:1rem; margin-bottom:2rem;">
            <input type="text" id="beat-title" placeholder="Beat Adı (Örn: Dark Trap Type Beat)">
            <input type="file" id="beat-file" accept="audio/*">
            <button class="btn btn-primary" id="upload-beat-btn">Beat Yükle</button>
          </div>
          <div id="beats-list" class="list-grid"><p>Yükleniyor...</p></div>
        </div>

        <div id="panel-presets" class="kitchen-panel" style="display:none;">
          <div style="display:flex; flex-direction:column; gap:1rem; margin-bottom:2rem;">
            <input type="text" id="preset-title" placeholder="Preset Adı (Örn: Vocal Chain v1)">
            <textarea id="preset-desc" rows="3" placeholder="Preset Tarifi / Kullanım Amacı"></textarea>
            <input type="file" id="preset-file">
            <button class="btn btn-primary" id="upload-preset-btn">Preset Yükle</button>
          </div>
          <div id="presets-list" class="list-grid"><p>Yükleniyor...</p></div>
        </div>

        <div id="panel-stems" class="kitchen-panel" style="display:none;">
          <div style="display:flex; flex-direction:column; gap:1rem; margin-bottom:2rem;">
            <input type="text" id="stem-title" placeholder="Şarkı Adı">
            <div style="display:flex; gap:1rem;">
              <input type="number" id="stem-bpm" placeholder="BPM">
              <input type="text" id="stem-key" placeholder="Ton (Örn: C# minor)">
            </div>
            <input type="file" id="stem-file" accept=".zip,.rar">
            <button class="btn btn-primary" id="upload-stem-btn">Stem Yükle (Projelere Bildirim Gider)</button>
          </div>
          <div id="stems-list" class="list-grid"><p>Yükleniyor...</p></div>
        </div>
      </div>
      
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/kitchen.js"></script>
  <script>
    function switchKitchenTab(tab) {
      document.getElementById('panel-beats').style.display = 'none';
      document.getElementById('panel-presets').style.display = 'none';
      document.getElementById('panel-stems').style.display = 'none';
      document.getElementById('panel-' + tab).style.display = 'block';
    }
  </script>
</body>
</html>
