<header class="top-header" style="position: relative;">
  <div style="display: flex; align-items: center; gap: 10px;">
    <button id="mobile-menu-btn" class="btn btn-ghost" style="display: none; font-size: 1.5rem; padding: 0 10px; border: none; color: var(--txt);">☰</button>
    <h2><span id="page-title">Dashboard</span></h2>
  </div>
  
  <div class="header-actions" style="display: flex; align-items: center; gap: 15px;">
    <!-- Bildirim İkonu -->
    <a href="notifications.html" class="btn btn-secondary btn-icon" style="padding: 10px; border-radius: 50%;">
      🔔
    </a>
    
    <!-- Kullanıcı Menüsü -->
    <div style="position: relative; cursor: pointer;" onclick="document.getElementById('user-dropdown').classList.toggle('show')">
      <div style="display: flex; align-items: center; gap: 10px;">
        <span id="nav-username" style="font-family: 'Space Mono'; font-weight: bold; color: var(--shn-pink);">Kullanıcı</span>
        <div id="nav-avatar" class="avatar" style="width: 35px; height: 35px; background-size: cover; background-position: center;"></div>
      </div>
      
      <!-- Dropdown -->
      <div id="user-dropdown" style="display: none; position: absolute; right: 0; top: 50px; background: #111; border: 1px solid var(--line-strong); border-radius: 10px; padding: 10px; min-width: 150px; flex-direction: column; gap: 5px; z-index: 1000; box-shadow: 0 0 20px rgba(0,0,0,0.8);">
        <a href="profile.html" style="padding: 10px; color: var(--txt); text-decoration: none; border-radius: 5px; transition: 0.3s; font-family: 'Space Mono'; font-size: 0.8rem;">⚙️ Ayarlar</a>
        <a href="#" onclick="window.logoutUser()" style="padding: 10px; color: var(--bad); text-decoration: none; border-radius: 5px; transition: 0.3s; font-family: 'Space Mono'; font-size: 0.8rem;">🚪 Oturumu Kapat</a>
      </div>
    </div>
  </div>
</header>
<style>
  #user-dropdown.show { display: flex !important; }
  #user-dropdown a:hover { background: rgba(255,255,255,0.1); }
</style>
<script>
  // Navbar user adını ve avatarını çekme
  setTimeout(() => {
    const un = localStorage.getItem('userName');
    if(un) document.getElementById('nav-username').innerText = un;
    
    const av = localStorage.getItem('userAvatar');
    if(av) document.getElementById('nav-avatar').style.backgroundImage = `url(${av})`;
  }, 500);

  // Dışarı tıklayınca dropdown kapatma
  document.addEventListener('click', (e) => {
    const dropdown = document.getElementById('user-dropdown');
    if(dropdown && !e.target.closest('.header-actions')) {
      dropdown.classList.remove('show');
    }
  });

  // Mobile menu
  setTimeout(() => {
    const btn = document.getElementById('mobile-menu-btn');
    if(btn) {
      btn.addEventListener('click', () => {
        document.querySelector('.sidebar')?.classList.toggle('open');
      });
    }
  }, 100);
</script>
