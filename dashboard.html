<!DOCTYPE html>
<html lang="tr">
<head>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#030303">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="simge.jpg" type="image/jpeg">
  <title>Dashboard - MüzikHan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-container">
    
    <div id="sidebar-container"></div>
    
    <div class="main-content">
      <div id="navbar-container"></div>

      <div class="stats-grid">
        <div class="card stat-card">
          <h3 id="stat-demos">...</h3>
          <p>Bekleyen Demolar</p>
        </div>
        <div class="card stat-card">
          <h3 id="stat-releases">...</h3>
          <p>Bekleyen Release</p>
        </div>
        <div class="card stat-card">
          <h3 id="stat-beats">...</h3>
          <p>Yeni Beat</p>
        </div>
        <div class="card stat-card">
          <h3 id="stat-presets">...</h3>
          <p>Yeni Preset</p>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom:1rem;">Bugünkü İşler / Görevler</h3>
        <p class="text-mut">Henüz atanmış bir göreviniz bulunmuyor.</p>
      </div>
      
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
